[agent]
scoring_interval_secs = 60
baseline_window_days  = 30
log_level             = "info"
# Leave paths unset to use platform-aware defaults:
# - Linux:   /var/lib/vigil-agent/agent.db and /var/run/vigil-agent/agent.sock
# - macOS:   ~/Library/Application Support/vigil-agent/agent.db and /tmp/vigil-agent.sock
# - Windows: %PROGRAMDATA%\VigilAgent\agent.db and \\.\pipe\vigil-agent
# db_path            = "/custom/path/agent.db"
# ipc_path           = "/custom/path/agent.sock"

[policy]
risk_weights_override = {}
off_hours_start       = "18:00"
off_hours_end         = "08:00"
sensitive_app_categories = ["finance", "security", "devtools-remote"]

[telemetry]
# remote_endpoint = "https://siem.corp.example.com/events"
# mtls_cert_path  = "/etc/vigil-agent/device.crt"
# mtls_key_path   = "/etc/vigil-agent/device.key"
emit_interval_secs = 300

[thresholds]
medium   = 30
high     = 55
critical = 75
